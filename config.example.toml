# pingmeup config example. Copy to ./config.toml or /etc/pingmeup/config.toml
# (or set PINGMEUP_CONFIG to a custom path). Keep this file mode 600.

[telegram]
bot_token = "your_bot_token_here"
chat_id = "your_chat_id_here"
timeout_secs = 8

[monitor]
cpu_threshold = 85.0
ram_threshold = 85.0
disk_threshold = 90.0
disk_scan_paths = ["/var", "/home", "/opt"]
largest_files_limit = 5
max_message_length = 3500
top_processes = 3
